# Forge Context Server — production config (VM 113)
#
# HTTP transport, Tailscale-accessible.

server:
  transport: http
  host: 0.0.0.0
  port: 8080
  name: forge-context-server
  version: 0.1.0-dev

sources:
  - name: workspace-synced
    type: workspace
    enabled: true
    options:
      root: /opt/forge/workspace

  - name: memories
    type: memories
    enabled: true
    options:
      root: /opt/forge/data/memories

logging:
  level: info
  format: text
